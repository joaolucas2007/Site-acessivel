<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Formulário Acessível</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1 class="titulo-principal">Site Acessível</h1>

<div class="acessibilidade" aria-label="Controles de acessibilidade">
  <button id="aumentar-fonte">A+</button>
  <button id="diminuir-fonte">A-</button>
  <button id="contraste">Alto Contraste</button>
</div>

<nav aria-label="Navegação principal">
  <ul class="menu">
    <li><a href="index.html" aria-current="page">Formulário</a></li>
    <li><a href="tabela.html">Tabela</a></li>
  </ul>
</nav>

<main>
  <h2>Cadastro</h2>

  <form id="formulario" novalidate>

    <fieldset>
      <legend>Dados de Cadastro</legend>

      <div class="campo">
        <label for="nome">Nome</label>
        <input type="text" id="nome" aria-required="true" aria-describedby="erro-nome">
        <span id="erro-nome" class="erro"></span>
      </div>

      <div class="campo">
        <label for="email">E-mail</label>
        <input type="email" id="email" aria-required="true" aria-describedby="erro-email">
        <span id="erro-email" class="erro"></span>
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <input type="password" id="senha" aria-required="true" aria-describedby="erro-senha">
        <span id="erro-senha" class="erro"></span>
      </div>

    </fieldset>

    <fieldset>
      <legend>Dados Pessoais</legend>

      <div class="campo">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" aria-required="true" aria-describedby="erro-cpf">
        <span id="erro-cpf" class="erro"></span>
      </div>

      <div class="campo">
        <label for="data">Data de nascimento</label>
        <input type="date" id="data" aria-required="true" aria-describedby="erro-data">
        <span id="erro-data" class="erro"></span>
      </div>

      <div class="campo">
        <span>Gênero</span>
        <div>
          <input type="radio" id="masc" name="genero" value="masculino" aria-describedby="erro-genero">
          <label for="masc">Masculino</label>
        </div>
        <div>
          <input type="radio" id="fem" name="genero" value="feminino">
          <label for="fem">Feminino</label>
        </div>
        <span id="erro-genero" class="erro"></span>
      </div>

    </fieldset>

    <button type="submit">Enviar</button>

  </form>
</main>

<script src="script.js"></script>
</body>
</html>
